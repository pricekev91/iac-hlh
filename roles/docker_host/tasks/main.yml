---
- name: Install prerequisites
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - software-properties-common
    state: present
    update_cache: true

- name: Add Docker GPG key
  ansible.builtin.apt_key:
    url: "https://download.docker.com/linux/ubuntu/gpg"
    state: present
    keyring: "/usr/share/keyrings/docker-archive-keyring.gpg"

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu {{ ansible_lsb.codename | default(ansible_distribution_release) }} stable"
    state: present
    filename: docker

- name: Install Docker CE
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Ensure Docker is enabled and running
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
    daemon_reload: true

- name: Create Dockhand data directory
  ansible.builtin.file:
    path: /var/lib/dockhand
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create Dockhand environment file
  ansible.builtin.copy:
    content: |
      DOCKHAND_HOST={{ docker_host_ip }}
      DOCKHAND_PORT={{ dockhand_host_port }}
    dest: /etc/dockhand.env
    owner: root
    group: root
    mode: '0644'

- name: Deploy Dockhand container
  community.docker.docker_container:
    name: "{{ dockhand_container_name }}"
    image: "{{ dockhand_image }}"
    restart_policy: unless-stopped
    published_ports:
      - "{{ dockhand_host_ip }}:{{ dockhand_host_port }}:80"
    env_file: /etc/dockhand.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/dockhand/data:/data
    state: started
    recreate: true

- name: Deploy Dockhand systemd service
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Dockhand Container
      After=docker.service
      Requires=docker.service

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      ExecStart=/usr/bin/systemctl start dockhand.service
      ExecStop=/usr/bin/systemctl stop dockhand.service
      TimeoutStartSec=0
      TimeoutStopSec=30

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/dockhand.service
    owner: root
    group: root
    mode: '0644'
  notify: restart dockhand

- name: Install Lazydocker
  ansible.builtin.apt:
    name: lazydocker
    state: present
  when: lazydocker_install | bool
