---
- name: Attach AMD GPU to AI VM on Proxmox host
  hosts: proxmox_hosts
  become: true
  gather_facts: false
  vars:
    ai_vm_id: 203
    gpu_hostpci_slot: "c5:00.0"
    gpu_audio_hostpci_slot: "c5:00.1"
  tasks:
    - name: Ensure VM is stopped before passthrough reconfiguration
      ansible.builtin.command: "qm stop {{ ai_vm_id }}"
      failed_when: false
      changed_when: false

    - name: Attach GPU function to AI VM
      ansible.builtin.command: "qm set {{ ai_vm_id }} --hostpci0 {{ gpu_hostpci_slot }},pcie=1"

    - name: Attach GPU audio function to AI VM
      ansible.builtin.command: "qm set {{ ai_vm_id }} --hostpci1 {{ gpu_audio_hostpci_slot }},pcie=1"

    - name: Enable q35, OVMF and PCI passthrough friendly settings
      ansible.builtin.command: "qm set {{ ai_vm_id }} --machine q35 --bios ovmf"

    - name: Start AI VM after passthrough setup
      ansible.builtin.command: "qm start {{ ai_vm_id }}"
