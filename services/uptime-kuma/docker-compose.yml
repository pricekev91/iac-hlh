services:
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "3003:3001"
    volumes:
      - uptime-kuma-data:/app/data
    healthcheck:
      test: ["CMD", "node", "extra/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  uptime-kuma-data:
