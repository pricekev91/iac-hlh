---
- name: Decommission legacy AI Engine LXC on Proxmox
  hosts: proxmox_hosts
  become: true
  gather_facts: false
  vars:
    legacy_ai_lxc_vmid: 101
    decommission_confirm: false
  tasks:
    - name: Require explicit confirmation before destructive steps
      ansible.builtin.assert:
        that:
          - decommission_confirm | bool
        fail_msg: "Set -e decommission_confirm=true to allow pct destroy"

    - name: Stop legacy AI LXC if running
      ansible.builtin.command: "pct stop {{ legacy_ai_lxc_vmid }}"
      failed_when: false
      changed_when: false

    - name: Destroy legacy AI LXC
      ansible.builtin.command: "pct destroy {{ legacy_ai_lxc_vmid }} --purge 1"
