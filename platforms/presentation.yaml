presentation:
  unprivileged: true
  onboot: true
  startup: order=30,up=15
  cores: 4
  memory_mb: 8192
  swap_mb: 2048
  rootfs_size_gb: 32
  tags: ai-presentation;shared;openwebui
  features: nesting=1,keyctl=1
  ui_port: 3000
  webui_auth: false
  default_models: qwen2.5-coder-verbose:latest
  default_model_params: {"stream_response":true,"stream_delta_chunk_size":12,"reasoning_tags":["think","thinking"]}