---
- name: Validate service orchestrator provider value
  ansible.builtin.assert:
    that:
      - service_orchestrator_provider in service_orchestrator_commands
    fail_msg: "Unsupported service_orchestrator_provider={{ service_orchestrator_provider }}"

- name: Ensure services root exists
  ansible.builtin.file:
    path: "{{ services_root_dir }}"
    state: directory
    mode: "0755"

- name: Ensure each stack directory exists
  ansible.builtin.file:
    path: "{{ services_root_dir }}/{{ item.name }}"
    state: directory
    mode: "0755"
  loop: "{{ hlh_service_stacks }}"

- name: Copy compose files for stacks
  ansible.builtin.copy:
    src: "{{ item.source_dir }}/"
    dest: "{{ services_root_dir }}/{{ item.name }}/"
    mode: "0644"
  loop: "{{ hlh_service_stacks }}"

- name: Start or update stacks with docker compose
  ansible.builtin.command:
    argv:
      - "{{ service_orchestrator_commands[service_orchestrator_provider].binary }}"
      - "{{ service_orchestrator_commands[service_orchestrator_provider].subcommand }}"
      - -f
      - "{{ services_root_dir }}/{{ item.name }}/{{ item.compose_file }}"
      - up
      - -d
  loop: "{{ hlh_service_stacks }}"
  register: compose_apply
  changed_when: >-
    'Creating' in compose_apply.stdout or
    'Recreating' in compose_apply.stdout or
    'Pulling' in compose_apply.stdout
