apiVersion: apps/v1
kind: Deployment
metadata:
  name: hlh-hello
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hlh-hello
  template:
    metadata:
      labels:
        app: hlh-hello
    spec:
      containers:
        - name: hello
          image: busybox:1.36
          command: ["sh", "-c", "while true; do echo hlh-ready; sleep 300; done"]
