---
ai_engine_user: ops
ai_engine_group: ops
ai_engine_workspace: /opt/ai-engine
ai_engine_models_dir: /srv/ai/models
ai_engine_logs_dir: /var/log/ai-engine

ai_rocm_apt_repo_url: "https://repo.radeon.com/rocm/apt/6.2"
ai_rocm_apt_repo_dist: noble
ai_rocm_apt_repo_component: main
ai_rocm_packages:
  - rocm
  - rocm-hip-runtime
  - rocm-smi-lib
  - rocminfo

ai_llama_cpp_repo: "https://github.com/ggml-org/llama.cpp.git"
ai_llama_cpp_ref: master
ai_llama_cpp_gpu_arch: gfx1030
ai_llama_cpp_port: 8081
ai_llama_cpp_model_path: /srv/ai/models/default.gguf

ai_backend_provider: llama_cpp

ai_vllm_enable: false
ai_vllm_venv: /opt/ai-engine/venv
ai_vllm_port: 8000
ai_vllm_model: "Qwen/Qwen2.5-7B-Instruct"
ai_vllm_torch_index_url: "https://download.pytorch.org/whl/rocm6.2"
