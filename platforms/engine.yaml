engine:
  unprivileged: false
  onboot: true
  startup: order=20,up=15
  cores: 12
  memory_mb: 49152
  swap_mb: 4096
  rootfs_size_gb: 96
  tags: ai-engine;shared;localai-stack
  features: nesting=1,keyctl=1
  enable_gpu: true
  webui_port: 8080
  localai_port: 3000
  default_model: tinyllama-1.1b-chat-v1.0
  default_model_url: https://huggingface.co/TheBloke/TinyLlama-1.1B-Chat-v1.0-GGUF/resolve/main/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf
  default_model_path: /srv/ai/models/default.gguf
  pull_default_model: true
  llama_context_size: 8192
  llama_gpu_layers: 99
  llama_threads: 12
  llama_batch_size: 512
  llama_parallel: 1
  llama_flash_attn: false
  llama_no_mmap: false
  llama_mlock: false
  llama_cache_type: ""

  gpu:
    card0: /dev/dri/card0
    render: /dev/dri/renderD128