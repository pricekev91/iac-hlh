---
- name: Pull Dockhand image from Docker Hub
  ansible.builtin.command:
    cmd: docker pull fnsys/dockhand:latest
  register: dockhand_pull
  changed_when: dockhand_pull.rc == 0

- name: Ensure Dockhand data directory exists
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: "{{ item.mode }}"
  loop:
    - { path: "/srv/dockhand", mode: "0755" }
    - { path: "/srv/dockhand/data", mode: "0755" }
    - { path: "/srv/dockhand/run", mode: "0755" }

- name: Deploy Dockhand container
  ansible.builtin.command:
    cmd: >
      docker run -d --name dockhand
      --restart unless-stopped
      -v /srv/dockhand/data:/data
      -v /var/run/docker.sock:/var/run/docker.sock
      -v /srv/dockhand/run:/run
      -p 8080:8080
      fnsys/dockhand:latest
  register: dockhand_run
  changed_when: dockhand_run.rc == 0
  failed_when: >
    dockhand_run.rc != 0 and
    '"already exists" not in dockhand_run.stderr'

- name: Verify Dockhand container is running
  ansible.builtin.command:
    cmd: "docker inspect --format='{{ '{{' }}.State.Running{{ '}}' }}' dockhand"
  register: dockhand_status
  changed_when: false

- name: Assert Dockhand is running
  ansible.builtin.assert:
    that:
      - dockhand_status.stdout == "true"
    fail_msg: "Dockhand container is not running!"
    success_msg: "Dockhand is running on port 8080"
