engine:
  unprivileged: false
  onboot: true
  cores: 12
  memory_mb: 49152
  swap_mb: 4096
  rootfs_size_gb: 96
  tags: ai-appliance;shared;engine
  features: nesting=1,keyctl=1
  enable_gpu: true
  api_port: 8080
  manager_port: 18080
  backend: ollama
  default_model: qwen2.5-coder:7b
  pull_default_model: false

  gpu:
    card0: /dev/dri/card0
    render: /dev/dri/renderD128