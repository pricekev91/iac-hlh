engine:
  unprivileged: false
  onboot: true
  startup: order=20,up=15
  cores: 12
  memory_mb: 49152
  swap_mb: 4096
  rootfs_size_gb: 96
  tags: ai-appliance;shared;engine
  features: nesting=1,keyctl=1
  enable_gpu: true
  api_port: 8080
  manager_port: 18080
  backend: ollama
  default_model: qwen2.5-coder:7b
  pull_default_model: false
  verbose_model_alias: qwen2.5-coder-verbose:latest
  verbose_num_predict: 4096
  verbose_system_prompt: Provide thorough, information-dense answers. State assumptions, explain tradeoffs, and include concrete next steps when helpful.

  gpu:
    card0: /dev/dri/card0
    render: /dev/dri/renderD128