---
- name: Validate container runtime provider value
  ansible.builtin.assert:
    that:
      - container_runtime_provider in ["docker", "dockhand"]
    fail_msg: "Unsupported container_runtime_provider={{ container_runtime_provider }}"

- name: Configure Docker runtime provider
  ansible.builtin.include_role:
    name: docker_host
  when: container_runtime_provider == "docker"

- name: Configure Dockhand runtime provider
  ansible.builtin.include_role:
    name: dockhand_host
  when: container_runtime_provider == "dockhand"
