engine:
  unprivileged: false
  onboot: true
  startup: order=20,up=15
  cores: 12
  memory_mb: 49152
  swap_mb: 4096
  rootfs_size_gb: 96
  tags: ai-engine;shared;llama-stack
  features: nesting=1,keyctl=1
  enable_gpu: true
  webui_port: 8080
  localai_port: 8081
  llama_server_port: 8082
  default_model: qwen2.5-coder:7b
  default_model_path: /srv/ai/models/default.gguf
  pull_default_model: false
  llama_context_size: 8192
  llama_gpu_layers: 99
  llama_threads: 12

  gpu:
    card0: /dev/dri/card0
    render: /dev/dri/renderD128